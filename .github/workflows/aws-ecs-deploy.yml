name: AWS MCP Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  TF_WORKING_DIR: infra/aws

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 | sort

      - name: Build and push image
        id: meta
        run: |
          set -euo pipefail
          : "${ECR_REPOSITORY:?ECR_REPOSITORY is required}"

          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_URI="${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker build -f ./Dockerfile -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Validate deploy inputs
        env:
          TF_VARS_JSON_B64: ${{ secrets.TF_VARS_JSON_B64 }}
        run: |
          set -euo pipefail
          : "${AWS_REGION:?AWS_REGION is required}"
          : "${ECS_CLUSTER:?ECS_CLUSTER is required}"
          : "${ECS_SERVICE:?ECS_SERVICE is required}"
          : "${TF_VARS_JSON_B64:?TF_VARS_JSON_B64 secret is required}"

      - name: Write Terraform variable file
        env:
          TF_VARS_JSON_B64: ${{ secrets.TF_VARS_JSON_B64 }}
        run: |
          set -euo pipefail
          echo "${TF_VARS_JSON_B64}" | base64 --decode > "${TF_WORKING_DIR}/ci.auto.tfvars.json"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform fmt check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -euo pipefail
          terraform apply -auto-approve \
            -var "aws_region=${AWS_REGION}" \
            -var "container_image=${{ needs.build-and-push.outputs.image_uri }}"

      - name: Force ECS rolling deployment
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}"
